app = "video-chat-webtransport"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[[services]]
  http_checks = []
  internal_port = 3000
  processes = ["app"]
  protocol = "tcp"
  script = null

  [[services.conditions]]
    HTTPHeaders = null
    path = ""

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.ports]]
    handlers = ["tls"]
    port = 4433

[[services]]
  http_checks = []
  internal_port = 3000
  processes = ["app"]
  protocol = "udp"
  script = null

  [[services.ports]]
    port = 443

[[vm]]
  size = "shared-cpu-1x"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
